name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v6
      - name: Test shared code (Android host)
        run: ./gradlew :composeApp:testAndroidHostTest
      - name: Build Android debug
        run: ./gradlew :androidApp:assembleDebug

  # iOS targets are intentionally not built in CI: Compose Multiplatform 1.11.0
  # references the iOS 26 UIKit symbol UIViewLayoutRegion, which the available
  # GitHub-hosted macOS runners' Xcode SDK does not yet provide (link fails).
  # Re-add an iOS job on a macos-26 runner when iOS work resumes.
